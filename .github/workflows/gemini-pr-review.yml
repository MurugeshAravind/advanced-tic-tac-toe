name: Gemini PR Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'src/**/*.ts'
      - 'src/**/*.tsx'
      - 'src/**/*.css'

jobs:
  review:
    name: AI Code Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD \
            -- 'src/**/*.ts' 'src/**/*.tsx' 'src/**/*.css' \
            > pr_diff.txt
          echo "diff_size=$(wc -c < pr_diff.txt)" >> $GITHUB_OUTPUT

      - name: Run Gemini Code Review
        if: steps.diff.outputs.diff_size != '0'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          DIFF_CONTENT=$(cat pr_diff.txt)

          SYSTEM_PROMPT="You are a senior React + TypeScript code reviewer for a tic-tac-toe application. Review the provided git diff and give structured, actionable feedback.

          Focus on:
          1. Correctness — edge cases (draw, filled cell, post-win clicks), immutable state updates
          2. Performance — useMemo, useCallback, React.memo usage
          3. Clean Code — DRY, named constants (no magic numbers), single-responsibility functions ≤30 lines
          4. TypeScript — no any, proper union types (Player = X|O), explicit prop interfaces
          5. React Patterns — hooks in custom hooks not components, no logic in JSX
          6. Design Patterns — separation of game logic from UI
          7. Security — no dangerouslySetInnerHTML, no direct DOM mutation

          Format your response as a GitHub PR comment using markdown:

          ## 🤖 Gemini Code Review

          ### ✅ Strengths
          - ...

          ### 🔴 Critical Issues _(must fix)_
          - **Title**: explanation
            // ❌ Current
            // ✅ Fix

          ### 🟡 Improvements _(should fix)_
          - ...

          ### 🔵 Suggestions _(nice to have)_
          - ...

          ### 📊 Score: X/10
          _one sentence verdict_

          If there are no issues in a category, omit that section. Be concise — this is a PR comment, not an essay."

          # Gemini API uses a different request shape — system prompt goes inside contents
          RESPONSE=$(curl -s \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=$GEMINI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg system "$SYSTEM_PROMPT" \
              --arg diff "$DIFF_CONTENT" \
              --arg pr_title "${{ github.event.pull_request.title }}" \
              '{
                system_instruction: {
                  parts: [{ text: $system }]
                },
                contents: [{
                  role: "user",
                  parts: [{
                    text: ("PR: " + $pr_title + "\n\nDiff:\n```diff\n" + $diff + "\n```")
                  }]
                }],
                generationConfig: {
                  maxOutputTokens: 2048,
                  temperature: 0.2
                }
              }' \
            )"
          )

          # Gemini response shape: .candidates[0].content.parts[0].text
          echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text' > review_comment.txt

          # Sanity check — if extraction failed, surface the raw error
          if [ ! -s review_comment.txt ] || grep -q "null" review_comment.txt; then
            echo "⚠️ Gemini API error or empty response:" > review_comment.txt
            echo "$RESPONSE" | jq '.' >> review_comment.txt
          fi

      - name: Post review comment
        if: steps.diff.outputs.diff_size != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const comment = fs.readFileSync('review_comment.txt', 'utf8');

            // Delete any previous review comments on this PR to keep it clean
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            for (const c of comments) {
              if (c.body.startsWith('## 🤖 Gemini Code Review')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: c.id,
                });
              }
            }

            // Post the fresh review
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment,
            });

      - name: No changes to review
        if: steps.diff.outputs.diff_size == '0'
        run: echo "No TypeScript/TSX/CSS changes found in this PR — skipping review."
